name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git . --config .gitleaks.toml --redact --verbose --no-banner

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Sync dependencies
        run: uv sync --frozen --group dev
      - name: Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Pytest
        run: uv run pytest
      - name: Build package
        run: uv build
      - name: Build container
        run: docker build .
