services:
  - type: web
    name: imsim-academy
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: IMSIM_HOST
        value: 0.0.0.0
      - key: IMSIM_GUNICORN_WORKERS
        value: 1
      - key: IMSIM_GUNICORN_THREADS
        value: 2
      - key: IMSIM_GUNICORN_TIMEOUT
        value: 120
      - key: IMSIM_GITHUB_URL
        value: https://github.com/SchmidtCode/IMSim
      - key: DATABASE_URL
        sync: false
