services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: imsim
      POSTGRES_USER: imsim
      POSTGRES_PASSWORD: imsim
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      IMSIM_HOST: 0.0.0.0
      IMSIM_PORT: 8050
      IMSIM_DATABASE_URL: postgresql+psycopg://imsim:imsim@db:5432/imsim
    ports:
      - "8050:8050"

volumes:
  postgres_data:
