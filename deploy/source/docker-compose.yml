services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${IMSIM_POSTGRES_DB:-imsim}
      POSTGRES_USER: ${IMSIM_POSTGRES_USER:-imsim}
      POSTGRES_PASSWORD: ${IMSIM_POSTGRES_PASSWORD:-imsim}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: ${IMSIM_IMAGE:-ghcr.io/schmidtcode/imsim:latest}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      IMSIM_HOST: 0.0.0.0
      IMSIM_PORT: 8050
      IMSIM_DATABASE_URL: postgresql+psycopg://${IMSIM_POSTGRES_USER:-imsim}:${IMSIM_POSTGRES_PASSWORD:-imsim}@db:5432/${IMSIM_POSTGRES_DB:-imsim}
      IMSIM_GUNICORN_WORKERS: 4
      IMSIM_GUNICORN_THREADS: 2
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8050/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "8050:8050"

volumes:
  postgres_data:
